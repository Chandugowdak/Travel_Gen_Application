name: Full Stack CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  # =========================
  # frontend JOB
  # =========================
  frontend:
    name: frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get Code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: ./frontend
        run: npm run build


  # =========================
  # backend JOB
  # =========================
  backend:
    name: backend Run
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get Code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: ✅ Verify backend Code
        working-directory: ./backend
        run: node -c Main.js